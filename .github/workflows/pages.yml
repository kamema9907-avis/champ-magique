# Construit et publie le jeu sur GitHub Pages a chaque push sur main.
#
# A faire UNE FOIS dans les reglages du depot GitHub :
#   Settings -> Pages -> Source : "GitHub Actions"
# Sans ca, le workflow tourne mais rien n'est publie.

name: Publier sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permet aussi de publier a la main depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Si deux publications se lancent coup sur coup, on laisse finir la premiere et
# on garde la derniere : pas d'annulation en plein deploiement.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  construire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  publier:
    needs: construire
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploiement.outputs.page_url }}
    steps:
      - id: deploiement
        uses: actions/deploy-pages@v4
